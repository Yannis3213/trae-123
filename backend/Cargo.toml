[package]
name = "patrol-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
poem = "2.0"
poem-openapi = "4.0"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.29", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
