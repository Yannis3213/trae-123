[package]
name = "legal-service-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
rocket = { version = "0.5.0", features = ["json"] }
rocket_cors = "0.6.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rusqlite = { version = "0.31", features = ["bundled", "chrono"] }
chrono = { version = "0.4", features = ["serde"] }
bcrypt = "0.15"
jsonwebtoken = "9.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
anyhow = "1.0"
thiserror = "1.0"
parking_lot = "0.12"
log = "0.4"
env_logger = "0.11"
rand = "0.8"

[dev-dependencies]
rocket_sync_db_pools = { version = "0.1.0", features = ["rusqlite"] }
