[package]
name = "police-case-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
rocket = { version = "0.5.0", features = ["json"] }
rocket_cors = "0.6.0"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.7", features = ["runtime-tokio-native-tls", "sqlite", "chrono", "macros", "uuid"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["serde", "v4"] }
argon2 = "0.5"
rand = "0.8"
jsonwebtoken = "9.0"
thiserror = "1.0"
anyhow = "1.0"
dotenvy = "0.15"

[dev-dependencies]
tokio = { version = "1.0", features = ["rt", "rt-multi-thread", "macros"] }

[[bin]]
name = "server"
path = "src/main.rs"
